# One-shot workflow — TPT 40% fix already applied on 2026-06-10. Safe to delete.
name: Fix TPT Discount 40

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch TPT plans to 40 percent
        run: python3 scripts/fix_tpt_discount.py
      - name: Commit and push
        run: |
          git config user.name "MoxApp Bot"
          git config user.email "bot@moxapp.dev"
          git add data/plans.json frontend/public/plans.json frontend/data.json
          git diff --cached --quiet || git commit -m "fix: TPT discount recalc [skip ci]"
          git push

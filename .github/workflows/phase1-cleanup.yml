name: Phase 1 Cleanup (one-shot)

# Removes dead data copies and dead deploy configs, then deletes itself.
# Run once from the Actions tab (Run workflow), then it's gone.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove dead files
        run: |
          git rm --ignore-unmatch frontend/public/plans.json
          git rm --ignore-unmatch frontend/data.json
          git rm --ignore-unmatch render.yaml
          git rm --ignore-unmatch admin-update.sh
          git rm --ignore-unmatch .github/workflows/deploy.yml
          # self-destruct
          git rm --ignore-unmatch .github/workflows/phase1-cleanup.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "Nothing to remove - repo already clean."
          else
            git commit -m "chore: phase 1 cleanup - remove dead data copies and deploy cruft"
            git push
          fi

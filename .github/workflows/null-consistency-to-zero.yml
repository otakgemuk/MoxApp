# One-shot workflow — null consistency fix already applied on 2026-06-10. Safe to delete.
name: Null Consistency To Zero

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set null consistency fields to 0
        run: python3 scripts/null_consistency_to_zero.py
      - name: Commit and push
        run: |
          git config user.name "MoxApp Bot"
          git config user.email "bot@moxapp.dev"
          git add data/plans.json frontend/public/plans.json frontend/data.json
          git diff --cached --quiet || git commit -m "fix: null consistency to 0 [skip ci]"
          git push
